# Default browser choice for Utils.java
browser=Chrome

# Landing page URL for the Mercury Tours demo site
landingPage.URL=https://demo.guru99.com/test/newtours/

# --- Login Page Locators ---
# 'name' attribute for username field
login.username=userName
# 'name' attribute for password field
login.password=password
# 'name' attribute for submit/login button
login.submit=submit

# --- Home Page Locators ---
# Link text for the Flights menu option
home.flightsMenu=Flights

# --- Flights Page Locators ---
# 'name' attribute for round trip radio button
flights.tripType.round=tripType
# 'name' attribute for passengers dropdown
flights.passengers=passCount
# 'name' attribute for departure city dropdown
flights.departureCity=fromPort
# 'name' attribute for departure month dropdown
flights.departureMonth=fromMonth
# 'name' attribute for departure day dropdown
flights.departureDay=fromDay
# 'name' attribute for arrival city dropdown
flights.arrivalCity=toPort
# 'name' attribute for arrival month dropdown
flights.arrivalMonth=toMonth
# 'name' attribute for arrival day dropdown
flights.arrivalDay=toDay
# 'name' attribute for airline dropdown
flights.airline=airline
# 'name' attribute for continue/submit button
flights.continue=findFlights

# --- Result Message Locator ---
# XPath expression to capture the booking result message
# This is used in FlightsPage.getResultMessage() to validate booking outcome
result.message=//font[contains(text(),'After flight finder')]
